version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: oma_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file:
      - ./app/.env
    networks:
      - oma_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: oma_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - oma_network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: oma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-open_memory}
      POSTGRES_USER: ${DB_USERNAME:-oma_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - oma_pgdata:/var/lib/postgresql/data
    networks:
      - oma_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: oma_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./app:/var/www/html
    env_file:
      - ./app/.env
    networks:
      - oma_network
    depends_on:
      - db
      - app

networks:
  oma_network:
    driver: bridge

volumes:
  oma_pgdata:
    driver: local
